<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulEcho 3.0 - 小清新情绪空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary-pink: #FDF2F8;
            --primary-purple: #F5F3FF;
            --accent-purple: #A78BFA;
            --accent-pink: #F472B6;
            --text-main: #4B5563;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        .iphone-frame {
            width: 393px;
            height: 852px;
            background: #ffffff;
            border: 10px solid #e5e7eb;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .dynamic-island {
            width: 120px;
            height: 35px;
            background: #111;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .app-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #FFFFFF 0%, #FDF2F8 40%, #F5F3FF 100%);
            z-index: -1;
        }

        .soft-blur {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
        }

        .blur-1 { background: #FAE8FF; top: 10%; left: -10%; }
        .blur-2 { background: #E0E7FF; bottom: 20%; right: -10%; }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 35px;
            box-shadow: 0 15px 35px -5px rgba(167, 139, 250, 0.15);
        }

        .active-tab {
            color: var(--accent-purple);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .card-stack-item {
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .nav-blur {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .float-anim { animation: float 5s ease-in-out infinite; }
        
        .img-placeholder {
            background: linear-gradient(45deg, #f3e8ff, #fce7f3);
        }

        .mood-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mood-btn.selected {
            background: white;
            transform: scale(1.15);
            box-shadow: 0 10px 20px rgba(167, 139, 250, 0.2);
            border-color: var(--accent-purple);
        }

        .new-entry-anim {
            animation: entry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes entry {
            from { transform: translate(-50%, 100px) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>
        <div class="app-bg">
            <div class="soft-blur blur-1"></div>
            <div class="soft-blur blur-2"></div>
        </div>

        <!-- Content Area -->
        <div id="app-content" class="flex-1 flex flex-col overflow-hidden">
            <!-- Content Injected via Script -->
        </div>

        <!-- Navigation Bar -->
        <div class="h-24 nav-blur border-t border-purple-50 flex justify-around items-center px-6 pb-4 z-[100]">
            <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center gap-1 active-tab">
                <i data-lucide="flower-2" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">心迹</span>
            </button>
            <button onclick="switchTab('square')" id="tab-square" class="flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">广场</span>
            </button>
            <div class="relative -top-5">
                <button onclick="openPost()" class="w-14 h-14 bg-gradient-to-br from-pink-300 to-purple-400 rounded-full shadow-lg shadow-purple-200 flex items-center justify-center text-white active:scale-90 transition-transform">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
            <button onclick="switchTab('ai')" id="tab-ai" class="flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="smile" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Echo</span>
            </button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="user-round" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">我的</span>
            </button>
        </div>
        
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-200 rounded-full"></div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="fixed inset-0 z-[200] hidden flex items-end justify-center">
        <div class="absolute inset-0 bg-purple-100/40 backdrop-blur-sm" onclick="closePost()"></div>
        <div class="w-[393px] bg-white rounded-t-[45px] p-8 animate-in slide-in-from-bottom duration-500 shadow-2xl overflow-y-auto no-scrollbar max-h-[90%]">
            <div class="flex justify-between items-center mb-8">
                <button onclick="closePost()" class="text-slate-400 font-bold text-sm">取消</button>
                <h3 class="font-bold text-lg text-slate-700">记录小美好</h3>
                <button onclick="savePost()" class="px-5 py-2 bg-gradient-to-r from-purple-400 to-pink-400 text-white rounded-full font-bold text-sm shadow-md shadow-purple-100">发布</button>
            </div>

            <div class="mb-8">
                <p class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">现在的心情</p>
                <div class="flex justify-between px-2">
                    <button onclick="selectMood(this, 'happy')" class="mood-btn flex flex-col items-center gap-2 p-3 rounded-2xl border border-transparent bg-slate-50 selected">
                        <span class="text-2xl">😊</span>
                        <span class="text-[10px] font-bold text-slate-400">开心</span>
                    </button>
                    <button onclick="selectMood(this, 'calm')" class="mood-btn flex flex-col items-center gap-2 p-3 rounded-2xl border border-transparent bg-slate-50">
                        <span class="text-2xl">😌</span>
                        <span class="text-[10px] font-bold text-slate-400">平静</span>
                    </button>
                    <button onclick="selectMood(this, 'neutral')" class="mood-btn flex flex-col items-center gap-2 p-3 rounded-2xl border border-transparent bg-slate-50">
                        <span class="text-2xl">😐</span>
                        <span class="text-[10px] font-bold text-slate-400">一般</span>
                    </button>
                    <button onclick="selectMood(this, 'sad')" class="mood-btn flex flex-col items-center gap-2 p-3 rounded-2xl border border-transparent bg-slate-50">
                        <span class="text-2xl">☁️</span>
                        <span class="text-[10px] font-bold text-slate-400">低落</span>
                    </button>
                </div>
            </div>

            <div class="mb-6 relative">
                <textarea id="post-content" class="w-full h-40 bg-slate-50 border-none rounded-3xl p-6 text-slate-600 placeholder-slate-300 focus:ring-2 focus:ring-purple-100 outline-none text-lg resize-none" placeholder="这一刻的想法是..."></textarea>
            </div>

            <div class="flex gap-4 mb-8">
                <button class="flex-1 flex items-center justify-center gap-2 py-4 bg-slate-50 rounded-2xl text-slate-400 border border-dashed border-slate-200">
                    <i data-lucide="image" class="w-4 h-4"></i>
                    <span class="text-xs font-bold">添加照片</span>
                </button>
                <button class="flex-1 flex items-center justify-center gap-2 py-4 bg-slate-50 rounded-2xl text-slate-400">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                    <span class="text-xs font-bold">记录地点</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let diaries = [
            { id: 1, title: '春日午后的茶', content: '白瓷杯里的花果茶冒着热气，书页翻动的声音格外好听。', date: 'FEB 12', img: 'https://images.unsplash.com/photo-1544787210-2211d44b5639?auto=format&fit=crop&w=800&q=80' },
            { id: 2, title: '草莓味的黄昏', content: '今天的晚霞是草莓色的，云朵像蓬松的棉花糖。', date: 'FEB 10', img: 'https://images.unsplash.com/photo-1476610182048-b716b8518aae?auto=format&fit=crop&w=800&q=80' },
            { id: 3, title: '路边的小野花', content: '哪怕是在石缝里，也在努力地向着阳光生长呢。', date: 'FEB 08', img: 'https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=800&q=80' }
        ];

        const feeds = [
            { user: '茉莉酱', text: '早起给自己准备了一份元气早餐。', img: 'https://images.unsplash.com/photo-1494390248081-4e521a5940db?w=500&q=80' },
            { user: '云朵收集者', text: '捕捉到一只形状像猫的云。', img: 'https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?w=500&q=80' },
            { user: '盐系少女', text: '极简的生活，让内心更丰盈。', img: 'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=500&q=80' },
            { user: '风的影子', text: '在山谷里听到了回声。', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&q=80' }
        ];

        let currentTab = 'home';
        let currentMood = 'happy';

        function switchTab(tab) {
            currentTab = tab;
            const content = document.getElementById('app-content');
            
            // UI Toggle for Nav
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.classList.remove('active-tab', 'text-purple-400');
                btn.classList.add('text-slate-300');
            });
            const activeBtn = document.getElementById('tab-' + tab);
            activeBtn.classList.add('active-tab');
            activeBtn.classList.remove('text-slate-300');

            // Route content
            if (tab === 'home') renderHome();
            else if (tab === 'square') renderSquare();
            else if (tab === 'ai') renderAI();
            else if (tab === 'settings') renderSettings();
            
            lucide.createIcons();
        }

        function renderHome() {
            const content = document.getElementById('app-content');
            content.innerHTML = `
                <div class="px-8 pt-16 pb-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-3xl font-extrabold text-slate-700 tracking-tight">碎碎念</h2>
                            <p class="text-purple-300 text-[10px] mt-1 font-black uppercase tracking-widest">TODAY · 充满了期待</p>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-purple-300 border border-purple-50">
                            <i data-lucide="sparkle" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
                <div class="flex-1 relative mt-4" id="card-container">
                    ${diaries.map((d, i) => `
                        <div class="card-stack-item absolute w-[320px] h-[480px] left-1/2 -translate-x-1/2 glass-card overflow-hidden ${i === 0 && d.isNew ? 'new-entry-anim' : ''}" 
                             style="top: ${i * 28}px; transform: translateX(-50%) scale(${1 - i * 0.05}); z-index: ${100 - i}; opacity: ${1 - i * 0.15}">
                            <div class="w-full h-3/5 overflow-hidden img-placeholder">
                                <img src="${d.img}" class="w-full h-full object-cover" alt="diary" onerror="this.parentElement.classList.add('img-placeholder')">
                            </div>
                            <div class="p-7">
                                <div class="flex items-center gap-2 mb-3">
                                    <div class="h-[1px] w-5 bg-purple-200"></div>
                                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-300">${d.date}</span>
                                </div>
                                <h3 class="text-xl font-bold text-slate-700 mb-2 leading-tight">${d.title}</h3>
                                <p class="text-slate-400 text-sm leading-relaxed line-clamp-2 font-medium">${d.content}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSquare() {
            const content = document.getElementById('app-content');
            content.innerHTML = `
                <div class="px-6 pt-16 pb-4">
                    <h2 class="text-2xl font-bold text-slate-700">星云广场</h2>
                    <div class="flex gap-3 mt-4 overflow-x-auto pb-2 no-scrollbar">
                        <span class="px-6 py-2 bg-purple-100 text-purple-500 rounded-full text-xs font-bold shrink-0">全部心情</span>
                        <span class="px-6 py-2 bg-white text-slate-400 rounded-full text-xs font-bold shrink-0 shadow-sm">温柔瞬间</span>
                        <span class="px-6 py-2 bg-white text-slate-400 rounded-full text-xs font-bold shrink-0 shadow-sm">治愈摄影</span>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto px-4 pb-24 no-scrollbar">
                    <div class="columns-2 gap-4">
                        ${feeds.map(f => `
                            <div class="bg-white/80 rounded-[28px] mb-4 overflow-hidden shadow-sm border border-white p-1.5">
                                <img src="${f.img}" class="w-full object-cover aspect-[4/5] rounded-[22px]" alt="feed">
                                <div class="p-3">
                                    <p class="text-xs font-bold text-slate-600 line-clamp-2 mb-3 leading-relaxed">${f.text}</p>
                                    <div class="flex justify-between items-center">
                                        <div class="flex items-center gap-1.5">
                                            <div class="w-5 h-5 rounded-full bg-purple-100 border border-white"></div>
                                            <span class="text-[9px] text-slate-400 font-bold tracking-tighter">${f.user}</span>
                                        </div>
                                        <div class="flex items-center gap-1 text-pink-300">
                                            <i data-lucide="heart" class="w-3 h-3"></i>
                                            <span class="text-[9px] font-bold">128</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAI() {
            const content = document.getElementById('app-content');
            content.innerHTML = `
                <div class="flex-1 flex flex-col p-8 items-center justify-center">
                    <div class="relative mb-12">
                        <div class="w-32 h-32 bg-white rounded-[40px] flex items-center justify-center shadow-2xl shadow-purple-100/50 float-anim relative border border-white">
                            <i data-lucide="sparkles" class="w-12 h-12 text-purple-300"></i>
                            <div class="absolute -top-3 -right-3 bg-pink-100 text-pink-400 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest shadow-sm">ONLINE</div>
                        </div>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-700">你好呀，我是 Echo</h2>
                    <p class="text-slate-400 text-sm mt-3 text-center leading-relaxed px-6 font-medium">
                        我会用心倾听你的每一个碎碎念，并为你整理成温暖的回馈。
                    </p>
                    <div class="mt-12 space-y-4 w-full">
                        <div class="glass-card p-6 border-none shadow-xl shadow-purple-50">
                            <div class="flex items-center gap-2 mb-3 text-purple-400">
                                <i data-lucide="line-chart" class="w-4 h-4"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest">心情洞察</span>
                            </div>
                            <p class="text-sm text-slate-500 leading-loose">最近 3 天你提到的“幸福感”关键词增加了哦，继续保持！</p>
                        </div>
                    </div>
                    <div class="mt-auto w-full">
                        <div class="flex items-center gap-3 bg-white/90 rounded-full px-6 py-4 shadow-sm border border-white">
                            <input class="flex-1 bg-transparent border-none focus:outline-none text-sm text-slate-500 font-medium" placeholder="想对我说点什么吗？">
                            <i data-lucide="send" class="w-5 h-5 text-purple-300"></i>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettings() {
            const content = document.getElementById('app-content');
            content.innerHTML = `
                <div class="px-8 pt-16 pb-6 text-center">
                    <div class="w-24 h-24 rounded-[35px] bg-white mx-auto shadow-xl shadow-purple-100 overflow-hidden p-1.5 border border-white">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-full h-full object-cover rounded-[28px]" alt="avatar">
                    </div>
                    <h2 class="text-2xl font-black mt-5 text-slate-700 tracking-tight">早安，Explorer</h2>
                    <p class="text-purple-300 text-[10px] font-black mt-1 uppercase tracking-[0.3em]">已记录 128 天的心迹</p>
                </div>
                <div class="px-8 space-y-4 mt-6">
                    <div class="glass-card p-2 border-none">
                        ${['主题装扮', '心情锁', '数据导出', '通知设置'].map((item, i) => `
                            <div class="p-4 flex justify-between items-center ${i < 3 ? 'border-b border-purple-50' : ''}">
                                <span class="text-sm font-bold text-slate-600">${item}</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200"></i>
                            </div>
                        `).join('')}
                    </div>
                    <button class="w-full py-4 bg-white/60 text-slate-400 text-xs font-black uppercase tracking-widest rounded-3xl border border-white active:bg-white transition-colors">
                        Logout
                    </button>
                </div>
            `;
        }

        // Action Logic
        function selectMood(el, mood) {
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
            currentMood = mood;
        }

        function openPost() {
            document.getElementById('post-content').value = '';
            document.getElementById('post-modal').classList.remove('hidden');
        }

        function closePost() {
            document.getElementById('post-modal').classList.add('hidden');
        }

        function savePost() {
            const text = document.getElementById('post-content').value;
            if (!text.trim()) return;

            const now = new Date();
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            
            const newEntry = {
                id: Date.now(),
                title: text.substring(0, 10) + (text.length > 10 ? '...' : ''),
                content: text,
                date: months[now.getMonth()] + ' ' + String(now.getDate()).padStart(2, '0'),
                img: `https://images.unsplash.com/photo-${1518531933037 + Math.floor(Math.random() * 1000)}-91b2f5f229cc?auto=format&fit=crop&w=800&q=80`,
                isNew: true
            };

            diaries.unshift(newEntry);
            closePost();
            switchTab('home');

            setTimeout(() => {
                if(diaries[0]) diaries[0].isNew = false;
            }, 800);
        }

        window.onload = () => {
            switchTab('home');
        };
    </script>
</body>
</html>
